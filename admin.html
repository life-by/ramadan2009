<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অ্যাডমিন প্যানেল - সম্পূর্ণ কন্ট্রোল</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #f3f4f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        h1 { color: #059669; text-align: center; margin-bottom: 20px; }
        h2 { color: #374151; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px; margin: 20px 0 15px 0; }
        h3 { color: #059669; margin: 15px 0 10px 0; }
        .nav-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 20px; background: #f9fafb; padding: 10px; border-radius: 10px; }
        .tab-btn { background: #e5e7eb; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        .tab-btn.active { background: #059669; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #374151; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 10px;}
        textarea { resize: vertical; min-height: 80px; }
        .btn { background: #059669; color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 10px; }
        .btn-danger { background: #dc2626; }
        .btn-warning { background: #f59e0b; }
        .btn-blue { background: #3b82f6; }
        .btn-gray { background: #6b7280; }
        .item-list { background: #f9fafb; padding: 15px; border-radius: 10px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .item, .sub-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #e5e7eb; flex-wrap: wrap; gap: 10px; }
        .sub-item { padding: 8px; background: white; margin-bottom: 8px; border-radius: 6px; }
        .item-info { flex: 1; }
        .item-title { font-weight: 600; color: #1f2937; }
        .item-actions { display: flex; gap: 8px; }
        .item-actions button { padding: 5px 12px; font-size: 12px; }
        .hidden { display: none; }
        .status-msg { background: #d1fae5; color: #065f46; padding: 10px; border-radius: 8px; margin: 10px 0; display: none; }
        @media (max-width: 768px) { .sub-item { flex-direction: column; align-items: flex-start; } .item-actions { width: 100%; justify-content: flex-end; } }
    </style>
</head>
<body>

<div class="container">
    <h1>🛠️ অ্যাডমিন প্যানেল</h1>
    
    <div class="nav-tabs">
        <button class="tab-btn active" data-tab="quranTab">📖 কুরআন</button>
        <button class="tab-btn" data-tab="hadithTab">📚 হাদিস</button>
        <button class="tab-btn" data-tab="storyTab">📜 গল্প</button>
        <button class="tab-btn" data-tab="duaTab">🤲 দোয়া ও জিকির</button>
        <button class="tab-btn" data-tab="qnaTab">❓ প্রশ্ন ও উত্তর</button>
        <button class="tab-btn" data-tab="pdfTab">📕 পিডিএফ</button>
        <button class="tab-btn" data-tab="prayerTab">🕌 নামাজ</button>
        <button class="tab-btn" data-tab="settingsTab">⚙️ গ্লোবাল সেটিংস</button>
    </div>

    <!-- কুরআন ট্যাব -->
    <div id="quranTab" class="tab-content active">
        <h2>📖 কুরআন ম্যানেজমেন্ট</h2>
        <select id="quranTopicSelect"><option value="-1">-- নতুন টপিক তৈরি করুন --</option></select>
        <button class="btn btn-warning" onclick="showNewQuranTopicForm()">➕ নতুন টপিক</button>
        <button class="btn btn-danger" onclick="deleteQuranTopic()">🗑️ ডিলিট</button>
        <div id="quranTopicForm" class="hidden">
            <input type="text" id="quranTopicName" placeholder="যেমন: ধৈর্য ও সালাত">
            <button class="btn" onclick="saveQuranTopic()">💾 টপিক সেভ</button>
            <button class="btn btn-gray" onclick="hideQuranTopicForm()">❌ বাতিল</button>
        </div>
        <hr>
        <div id="quranVerseForm" class="hidden">
            <input type="hidden" id="quranVerseEditIndex" value="-1">
            <label>আরবি টেক্সট</label><textarea id="quranArabic"></textarea>
            <label>বাংলা অর্থ</label><textarea id="quranMeaning"></textarea>
            <label>সোর্স</label><input type="text" id="quranSource">
            <button class="btn" onclick="saveQuranVerse()">💾 আয়াত সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetQuranVerseForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="quranList"></div>
    </div>

    <!-- হাদিস ট্যাব -->
    <div id="hadithTab" class="tab-content">
        <h2>📚 হাদিস ম্যানেজমেন্ট</h2>
        <select id="hadithTopicSelect"><option value="-1">-- নতুন টপিক তৈরি করুন --</option></select>
        <button class="btn btn-warning" onclick="showNewHadithTopicForm()">➕ নতুন টপিক</button>
        <button class="btn btn-danger" onclick="deleteHadithTopic()">🗑️ ডিলিট</button>
        <div id="hadithTopicForm" class="hidden">
            <input type="text" id="hadithTopicName" placeholder="যেমন: নিয়তের গুরুত্ব">
            <button class="btn" onclick="saveHadithTopic()">💾 টপিক সেভ</button>
            <button class="btn btn-gray" onclick="hideHadithTopicForm()">❌ বাতিল</button>
        </div>
        <hr>
        <div id="hadithItemForm" class="hidden">
            <input type="hidden" id="hadithItemEditIndex" value="-1">
            <label>বাংলা অর্থ</label><textarea id="hadithMeaning"></textarea>
            <label>সোর্স</label><input type="text" id="hadithSource">
            <button class="btn" onclick="saveHadithItem()">💾 হাদিস সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetHadithItemForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="hadithList"></div>
    </div>

    <!-- গল্প ট্যাব -->
    <div id="storyTab" class="tab-content">
        <h2>📜 গল্প ম্যানেজমেন্ট</h2>
        <select id="storyTopicSelect"><option value="-1">-- নতুন টপিক তৈরি করুন --</option></select>
        <button class="btn btn-warning" onclick="showNewStoryTopicForm()">➕ নতুন টপিক</button>
        <button class="btn btn-danger" onclick="deleteStoryTopic()">🗑️ ডিলিট</button>
        <div id="storyTopicForm" class="hidden">
            <input type="text" id="storyTopicName" placeholder="যেমন: পিপাসার্ত কুকুর">
            <button class="btn" onclick="saveStoryTopic()">💾 টপিক সেভ</button>
            <button class="btn btn-gray" onclick="hideStoryTopicForm()">❌ বাতিল</button>
        </div>
        <hr>
        <div id="storyItemForm" class="hidden">
            <input type="hidden" id="storyItemEditIndex" value="-1">
            <label>গল্পের বিবরণ</label><textarea id="storyMeaning"></textarea>
            <label>সোর্স</label><input type="text" id="storySource">
            <button class="btn" onclick="saveStoryItem()">💾 গল্প সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetStoryItemForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="storyList"></div>
    </div>

    <!-- দোয়া ট্যাব (আপডেটেড) -->
    <div id="duaTab" class="tab-content">
        <h2>🤲 দোয়া ও জিকির ম্যানেজমেন্ট</h2>
        <select id="duaTopicSelect"><option value="-1">-- নতুন টপিক তৈরি করুন --</option></select>
        <button class="btn btn-warning" onclick="showNewDuaTopicForm()">➕ নতুন টপিক</button>
        <button class="btn btn-danger" onclick="deleteDuaTopic()">🗑️ ডিলিট</button>
        
        <div id="duaTopicForm" class="hidden" style="background:#f3f4f6; padding:10px; border-radius:8px; margin-top:10px;">
            <label>ক্যাটাগরি সিলেক্ট করুন:</label>
            <select id="duaTopicType">
                <option value="daily">দৈনিক দোয়া</option>
                <option value="zikr">জিকির</option>
            </select>
            <label>টপিকের নাম:</label>
            <input type="text" id="duaTopicName" placeholder="যেমন: সকালের দোয়া">
            <button class="btn" onclick="saveDuaTopic()">💾 টপিক সেভ</button>
            <button class="btn btn-gray" onclick="hideDuaTopicForm()">❌ বাতিল</button>
        </div>
        <hr>
        <div id="duaItemForm" class="hidden">
            <input type="hidden" id="duaItemEditIndex" value="-1">
            <label>আরবি টেক্সট</label><textarea id="duaArabic"></textarea>
            <label>বাংলা অর্থ/উচ্চারণ</label><textarea id="duaMeaning"></textarea>
            <label>সোর্স/ফজিলত</label><input type="text" id="duaSource">
            <button class="btn" onclick="saveDuaItem()">💾 সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetDuaItemForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="duaList"></div>
    </div>

    <!-- প্রশ্ন ও উত্তর ট্যাব (নতুন) -->
    <div id="qnaTab" class="tab-content">
        <h2>❓ প্রশ্ন ও উত্তর ম্যানেজমেন্ট</h2>
        <div id="qnaItemForm">
            <input type="hidden" id="qnaItemEditIndex" value="-1">
            <label>প্রশ্ন:</label><input type="text" id="qnaQuestion" placeholder="প্রশ্ন লিখুন...">
            <label>উত্তর:</label><textarea id="qnaAnswer" placeholder="বিস্তারিত উত্তর লিখুন..."></textarea>
            <label>সোর্স (ঐচ্ছিক):</label><input type="text" id="qnaSource" placeholder="দলিল/সূত্র">
            <button class="btn" onclick="saveQnaItem()">💾 প্রশ্ন-উত্তর সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetQnaForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="qnaList"></div>
    </div>

    <!-- পিডিএফ রিডার ট্যাব -->
    <div id="pdfTab" class="tab-content">
        <h2>📕 পিডিএফ রিডার ম্যানেজমেন্ট</h2>
        <div id="pdfItemForm" style="margin-bottom: 20px;">
            <input type="hidden" id="pdfItemEditIndex" value="-1">
            <label>বই/পিডিএফ এর নাম</label><input type="text" id="pdfTitle">
            <label>থাম্বনেইল লিংক (URL)</label><input type="text" id="pdfThumb">
            <label>পিডিএফ লিংক (URL)</label><input type="text" id="pdfUrl">
            <button class="btn" onclick="savePdfItem()">💾 পিডিএফ সেভ করুন</button>
            <button class="btn btn-gray" onclick="resetPdfForm()">🔄 ক্লিয়ার</button>
        </div>
        <div class="item-list" id="pdfList"></div>
    </div>

    <!-- নামাজ সেটিংস ট্যাব -->
    <div id="prayerTab" class="tab-content">
        <h2>🕌 নামাজের তালিকা কাস্টমাইজ</h2>
        <div id="prayerSettingsList"></div>
        <button class="btn" onclick="addPrayer()">➕ নতুন নামাজ</button>
        <button class="btn btn-blue" onclick="savePrayerSettings()">💾 সেভ করুন</button>
    </div>

    <!-- গ্লোবাল সেটিংস ট্যাব -->
    <div id="settingsTab" class="tab-content">
        <h2>⚙️ গ্লোবাল সেটিংস</h2>
        <button class="btn btn-blue" onclick="downloadBackup()">📥 ব্যাকআপ ডাউনলোড</button>
        <input type="file" id="backupFile" accept=".json" style="width: auto;">
        <button class="btn btn-warning" onclick="restoreBackup()">🔄 রিস্টোর</button>
        <br><br>
        <button class="btn" onclick="downloadDataJs()">📥 data.js ডাউনলোড</button>
        <button class="btn btn-blue" onclick="generateAndCopyCode()">📋 কোড কপি</button>
        <div id="outputCode" style="margin-top:10px; background:#111; color:#0f0; padding:10px; max-height:200px; overflow:auto;"></div>
    </div>
</div>

<script src="./data.js"></script>
<script>
    let editingData = { quran: [], hadith: [], story: [], dua: [], qna: [], pdfs: [], telegram: {} };
    let prayerSettings = JSON.parse(localStorage.getItem("admin_prayerSettings")) || [{id: "fajr", name: "ফজর", icon: "🌅"}];
    let currentQuranTopicIndex = -1, currentHadithTopicIndex = -1, currentStoryTopicIndex = -1, currentDuaTopicIndex = -1;

    function loadDataFromStorage() {
        if(typeof appData !== 'undefined') {
            editingData = { ...appData };
            if(!editingData.qna) editingData.qna = [];
        }
        const saved = localStorage.getItem("admin_editingData");
        if(saved) {
            const parsed = JSON.parse(saved);
            editingData = { ...editingData, ...parsed };
            if(!editingData.qna) editingData.qna = [];
        }
    }
    function syncEditingDataToStorage() { localStorage.setItem("admin_editingData", JSON.stringify(editingData)); }

    function openAdminTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        document.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');
        
        if(tabId === 'quranTab') { loadQuranTopics(); }
        if(tabId === 'hadithTab') { loadHadithTopics(); }
        if(tabId === 'storyTab') { loadStoryTopics(); }
        if(tabId === 'duaTab') { loadDuaTopics(); }
        if(tabId === 'qnaTab') { loadQnaList(); }
        if(tabId === 'pdfTab') { loadPdfList(); }
        if(tabId === 'prayerTab') { loadPrayerSettings(); }
    }
    document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => openAdminTab(btn.getAttribute('data-tab'))));

    // ---- QnA Section (New) ----
    function loadQnaList() {
        const c = document.getElementById('qnaList'); c.innerHTML = '';
        editingData.qna.forEach((q, i) => {
            c.innerHTML += `<div class="sub-item"><div class="item-info"><strong>${escapeHtml(q.question)}</strong></div>
            <div class="item-actions"><button class="btn btn-warning" onclick="editQnaItem(${i})">এডিট</button><button class="btn btn-danger" onclick="deleteQnaItem(${i})">ডিলিট</button></div></div>`;
        });
    }
    function saveQnaItem() {
        const idx = document.getElementById('qnaItemEditIndex').value;
        const nq = { question: document.getElementById('qnaQuestion').value, answer: document.getElementById('qnaAnswer').value, source: document.getElementById('qnaSource').value };
        if(!nq.question || !nq.answer) return alert("প্রশ্ন ও উত্তর দিন!");
        if(idx == "-1") editingData.qna.push(nq); else editingData.qna[idx] = nq;
        syncEditingDataToStorage(); resetQnaForm(); loadQnaList();
    }
    function editQnaItem(i) {
        const q = editingData.qna[i];
        document.getElementById('qnaItemEditIndex').value = i;
        document.getElementById('qnaQuestion').value = q.question;
        document.getElementById('qnaAnswer').value = q.answer;
        document.getElementById('qnaSource').value = q.source || '';
    }
    function deleteQnaItem(i) { if(confirm("ডিলিট?")) { editingData.qna.splice(i, 1); syncEditingDataToStorage(); loadQnaList(); } }
    function resetQnaForm() { document.getElementById('qnaItemEditIndex').value = "-1"; document.getElementById('qnaQuestion').value = ''; document.getElementById('qnaAnswer').value = ''; document.getElementById('qnaSource').value = ''; }

    // ---- Dua Tab (Updated) ----
    function loadDuaTopics() {
        const s = document.getElementById('duaTopicSelect'); s.innerHTML = '<option value="-1">-- নতুন টপিক তৈরি করুন --</option>';
        editingData.dua.forEach((t, i) => {
            let badge = t.type === 'zikr' ? '[জিকির]' : '[দৈনিক]';
            s.innerHTML += `<option value="${i}">${badge} ${escapeHtml(t.topic)}</option>`;
        });
        s.value = currentDuaTopicIndex >= 0 ? currentDuaTopicIndex : "-1";
    }
    document.getElementById('duaTopicSelect').addEventListener('change', () => {
        currentDuaTopicIndex = parseInt(document.getElementById('duaTopicSelect').value);
        if(currentDuaTopicIndex >= 0) { document.getElementById('duaItemForm').classList.remove('hidden'); loadDuaList(); resetDuaItemForm(); } 
        else document.getElementById('duaItemForm').classList.add('hidden');
    });
    function showNewDuaTopicForm() { document.getElementById('duaTopicForm').classList.remove('hidden'); }
    function hideDuaTopicForm() { document.getElementById('duaTopicForm').classList.add('hidden'); }
    function saveDuaTopic() {
        const n = document.getElementById('duaTopicName').value.trim();
        const type = document.getElementById('duaTopicType').value;
        if(!n) return;
        editingData.dua.push({topic: n, type: type, duas: []});
        syncEditingDataToStorage(); loadDuaTopics(); hideDuaTopicForm();
        currentDuaTopicIndex = editingData.dua.length - 1; document.getElementById('duaTopicSelect').value = currentDuaTopicIndex;
        document.getElementById('duaTopicSelect').dispatchEvent(new Event('change'));
    }
    function deleteDuaTopic() {
        if(currentDuaTopicIndex < 0) return;
        if(confirm("ডিলিট?")) { editingData.dua.splice(currentDuaTopicIndex, 1); syncEditingDataToStorage(); currentDuaTopicIndex = -1; loadDuaTopics(); document.getElementById('duaItemForm').classList.add('hidden'); loadDuaList(); }
    }
    function loadDuaList() {
        const c = document.getElementById('duaList'); c.innerHTML = '';
        if(currentDuaTopicIndex < 0) return;
        const t = editingData.dua[currentDuaTopicIndex];
        t.duas.forEach((v, i) => {
            c.innerHTML += `<div class="sub-item"><div class="item-info">${escapeHtml(v.meaning.substring(0,50))}...</div>
            <div class="item-actions"><button class="btn btn-warning" onclick="editDuaItem(${i})">এডিট</button><button class="btn btn-danger" onclick="deleteDuaItem(${i})">ডিলিট</button></div></div>`;
        });
    }
    function saveDuaItem() {
        const idx = document.getElementById('duaItemEditIndex').value;
        const nv = {arabic: document.getElementById('duaArabic').value, meaning: document.getElementById('duaMeaning').value, source: document.getElementById('duaSource').value};
        if(!nv.meaning) return;
        if(idx == "-1") editingData.dua[currentDuaTopicIndex].duas.push(nv); else editingData.dua[currentDuaTopicIndex].duas[idx] = nv;
        syncEditingDataToStorage(); resetDuaItemForm(); loadDuaList();
    }
    function editDuaItem(i) {
        const v = editingData.dua[currentDuaTopicIndex].duas[i];
        document.getElementById('duaItemEditIndex').value = i;
        document.getElementById('duaArabic').value = v.arabic||''; document.getElementById('duaMeaning').value = v.meaning; document.getElementById('duaSource').value = v.source||'';
    }
    function deleteDuaItem(i) { if(confirm("ডিলিট?")) { editingData.dua[currentDuaTopicIndex].duas.splice(i, 1); syncEditingDataToStorage(); loadDuaList(); } }
    function resetDuaItemForm() { document.getElementById('duaItemEditIndex').value = "-1"; document.getElementById('duaArabic').value = ''; document.getElementById('duaMeaning').value = ''; document.getElementById('duaSource').value = ''; }

    // (কুরআন, হাদিস, গল্প, পিডিএফ, সেটিংস আগের মতই আছে, শুধু সংক্ষেপে লিখা হলো যেন কোড সাইজ বাড়ে না)
    // Helpers
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function downloadDataJs() { const code = `const appData = ${JSON.stringify(editingData, null, 4)};`; const blob = new Blob([code], {type: "application/javascript"}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = "data.js"; a.click(); }
    function generateAndCopyCode() { const code = `const appData = ${JSON.stringify(editingData, null, 4)};`; document.getElementById('outputCode').innerText = code; navigator.clipboard.writeText(code); alert("কপি হয়েছে!"); }
    
    // (You can keep the rest of your original Quran/Hadith/Story functions here exactly as they were)
    window.onload = () => { loadDataFromStorage(); loadQuranTopics(); };
</script>
</body>
</html>
