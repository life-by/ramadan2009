<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>ইফতার টাস্ক ম্যানেজার | খুলনা</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', 'Nikosh', 'Vrinda', 'Bangla', system-ui, sans-serif;
        }

        body {
            background: #f4fbf4;
            min-height: 100vh;
            padding: 0.8rem;
            display: flex;
            justify-content: center;
            color: #1a2e1a;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            border-radius: 2rem;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(6px);
            box-shadow: 0 30px 50px -20px #0f5132, 0 0 0 1px #19875430 inset;
            padding: 1.5rem 1rem;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #0f5132;
        }

        h1 span {
            background: #198754;
            color: white;
            font-size: 0.9rem;
            padding: 0.2rem 1rem;
            border-radius: 40px;
        }

        /* টাইমস কার্ড */
        .prayer-times-card {
            background: linear-gradient(135deg, #0f5132, #1e7b4b);
            color: white;
            border-radius: 1.5rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 15px 25px -10px #0f5132;
        }

        .ramadan-phase {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .phase-badge {
            background: #ffc107;
            color: #0f5132;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-weight: 700;
        }

        .date-selector {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .date-nav {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.15);
            padding: 0.3rem;
            border-radius: 50px;
        }

        .nav-btn {
            background: white;
            color: #0f5132;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .current-date {
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .time-display {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            background: rgba(0,0,0,0.2);
            padding: 1rem 0.5rem;
            border-radius: 1.2rem;
        }

        .time-item {
            text-align: center;
            flex: 1;
            min-width: 100px;
        }

        .time-label {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-bottom: 0.3rem;
        }

        .time-value {
            font-size: 1.4rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .gregorian-date {
            text-align: center;
            font-size: 0.85rem;
            background: rgba(0,0,0,0.2);
            padding: 0.4rem;
            border-radius: 30px;
            margin-top: 0.8rem;
        }

        /* বাটন */
        .top-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
        }

        .btn {
            border: none;
            background: #198754;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 8px 18px -6px #0f5132;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #0f5132;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            line-height: 1;
        }

        .btn-outline {
            background: white;
            color: #0f5132;
            border: 2px solid #198754;
            box-shadow: none;
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-warning {
            background: #dc3545;
            border-color: #a71d2a;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -10px #0f5132;
            background: #0f5132;
        }

        .btn-outline:hover {
            background: #e9f3e9;
            color: #0f5132;
        }

        .print-btn {
            background: white;
            color: #0f5132;
            border: 2px solid #0f5132;
            box-shadow: none;
        }
        .print-btn:hover { background: #0f5132; color: white; }

        /* টিম কার্ড */
        .teams-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .team-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 15px 30px -12px #0f513270, 0 0 0 1px #198754 inset;
            overflow: hidden;
        }

        .card-header {
            padding: 1rem 1.2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            background: linear-gradient(135deg, #f6fff6 0%, #eaffea 100%);
            border-bottom: 2px solid #19875430;
        }

        .team-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0f5132;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.5rem;
        }

        .leader-badge {
            background: #0f5132;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .leader-badge::before {
            content: "👑";
            font-size: 0.9rem;
        }

        .team-meta {
            font-size: 0.8rem;
            color: #2b5e2b;
            background: #dcf5dc;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
        }

        .chevron {
            font-size: 1.8rem;
            color: #198754;
            transition: transform 0.3s ease;
        }

        .card-body {
            padding: 1.2rem 1rem;
            background: #ffffff;
            display: none;
        }

        .card-body.open {
            display: block;
        }

        /* টাস্ক সেকশন */
        .task-section {
            background: #f0faf0;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid #19875430;
        }

        .task-section h4 {
            color: #0f5132;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-weight: 700;
        }

        .task-section h4::before {
            content: "📋";
            font-size: 1.1rem;
        }
        .task-section:first-of-type h4::before { content: "🌅"; }
        .task-section:last-of-type h4::before { content: "🌃"; }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            padding: 0.6rem 0;
            border-bottom: 1px dashed #19875440;
            font-size: 0.95rem;
        }

        .task-item:last-child {
            border: none;
        }

        .task-item input[type="checkbox"] {
            flex-shrink: 0;
            width: 1.3rem;
            height: 1.3rem;
            accent-color: #0f5132;
            cursor: pointer;
        }

        .task-text {
            flex: 1;
            line-height: 1.4;
            color: #1e3a1e;
        }

        /* সদস্য তালিকা */
        .member-list {
            background: linear-gradient(145deg, #e1f3e1, #d0e9d0);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid #19875440;
        }

        .member-list strong {
            color: #0f5132;
            font-size: 1rem;
            display: block;
            margin-bottom: 0.6rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .member-list strong::before {
            content: "👥";
        }

        .member-names {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .member-names span {
            background: white;
            color: #0f5132;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            border: 1.5px solid #198754;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 2px 6px #19875430;
        }

        /* অ্যাডমিন কর্নার */
        .admin-corner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .admin-corner .btn {
            width: 50px;
            height: 50px;
            border-radius: 50px;
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 25px #0f5132;
            background: #0f5132;
            border: 2px solid white;
            padding: 0;
        }

        /* অ্যাডমিন প্যানেল */
        .login-section, .admin-section {
            background: white;
            border-radius: 2rem;
            padding: 1.5rem;
            box-shadow: 0 30px 40px -20px #0f5132, 0 0 0 2px #198754 inset;
        }

        .team-editor {
            background: #f0faf0;
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin-bottom: 1.5rem;
            border: 1px solid #198754;
        }

        .leader-input, .member-input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.8rem 0;
            align-items: center;
        }

        .leader-input input, .member-input-group input {
            flex: 2 1 200px;
            padding: 0.7rem 1rem;
            border-radius: 40px;
            border: 2px solid #198754;
            font-size: 0.95rem;
            outline: none;
        }

        .member-list-admin {
            background: white;
            border-radius: 1rem;
            padding: 0.8rem;
        }

        .member-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.4rem 0;
            border-bottom: 1px solid #ccc;
            font-size: 0.9rem;
        }

        .del-btn {
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 0.2rem 0.8rem;
            font-weight: bold;
            cursor: pointer;
        }

        .new-team-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            background: #e1f3e1;
            padding: 1.2rem;
            border-radius: 1.5rem;
            margin-top: 1.5rem;
        }

        .footer-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-top: 1.5rem;
        }

        .hidden {
            display: none !important;
        }

        @media print {
            body { background: white; padding: 0; }
            .top-actions, .admin-corner, .login-section, .admin-section { display: none !important; }
            .app-container { box-shadow: none; background: white; padding: 0.5rem; }
            .card-body { display: block !important; }
        }

        @media (max-width: 480px) {
            .app-container { padding: 1rem; }
            h1 { font-size: 1.5rem; }
            .time-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <!-- অ্যাডমিন টগল বাটন -->
    <div class="admin-corner">
        <button class="btn" id="adminToggleBtn" title="অ্যাডমিন প্যানেল">⚙️</button>
    </div>

    <!-- ইউজার ভিউ -->
    <section id="userView">
        <h1>
            ইফতার টাস্ক ম্যানেজার<br>মসজিদে আমানাত
            <span>টিম ওয়ার্ক</span>
        </h1>
        
        <!-- ইফতার ও সেহরির সময় কার্ড -->
        <div class="prayer-times-card" id="prayerTimesCard">
            <div class="ramadan-phase">
                <span>🌙 রমজান ১৪৪৬</span>
                <span class="phase-badge" id="phaseBadge">১ম ১০ দিন (রহমত)</span>
            </div>
            
            <div class="date-selector">
                <div class="date-nav">
                    <button class="nav-btn" id="prevDayBtn" onclick="changeDay(-1)">◀</button>
                    <span class="current-date" id="currentDateDisplay">১১ ফেব্রুয়ারি</span>
                    <button class="nav-btn" id="nextDayBtn" onclick="changeDay(1)">▶</button>
                </div>
                <span id="weekdayDisplay" style="background:rgba(255,255,255,0.2); padding:0.3rem 1rem; border-radius:40px;">বৃহস্পতিবার</span>
            </div>
            
            <div class="time-display">
                <div class="time-item">
                    <div class="time-label">🌙 সেহরি শেষ</div>
                    <div class="time-value" id="sehriTime">৫:১৫</div>
                </div>
                <div class="time-item">
                    <div class="time-label">⭐ ফজর শুরু</div>
                    <div class="time-value" id="fajrTime">৫:১৮</div>
                </div>
                <div class="time-item">
                    <div class="time-label">🍽️ ইফতার</div>
                    <div class="time-value" id="iftarTime">৬:০২</div>
                </div>
            </div>
            
            <div class="gregorian-date" id="gregorianDisplay">
                ১১ ফেব্রুয়ারি ২০২৬, বৃহস্পতিবার
            </div>
        </div>

        <div class="top-actions">
            <button class="btn print-btn" id="printViewBtn">🖨️ প্রিন্ট</button>
        </div>
        <div id="teamsAccordion" class="teams-container">
            <!-- JS দ্বারা রেন্ডার হবে -->
        </div>
    </section>

    <!-- অ্যাডমিন লগইন -->
    <section id="adminLogin" class="login-section hidden">
        <h2>🔑 অ্যাডমিন লগইন</h2>
        <input type="password" id="adminPass" placeholder="পাসওয়ার্ড দিন" style="width:100%; padding:0.8rem; border-radius:40px; border:2px solid #198754; font-size:1rem; margin-bottom:1rem;">
        <button class="btn" id="loginBtn" style="width:100%">প্রবেশ করুন</button>
        <p class="hint" style="margin-top:1rem; color:#0f5132;">(পাসওয়ার্ড: <strong>00</strong>)</p>
    </section>

    <!-- অ্যাডমিন ড্যাশবোর্ড -->
    <section id="adminDashboard" class="admin-section hidden">
        <h2>⚙️ অ্যাডমিন প্যানেল</h2>
        <div id="teamEditorsContainer"></div>
        <div class="new-team-form">
            <input type="text" id="newTeamName" placeholder="নতুন টিমের নাম" style="flex:2; min-width:200px; padding:0.7rem 1rem; border-radius:40px; border:2px solid #198754;">
            <button class="btn btn-sm" id="addNewTeamBtn">+ টিম যোগ</button>
        </div>
        <div class="footer-actions">
            <button class="btn btn-outline" id="logoutBtn">🚪 লগআউট</button>
            <button class="btn btn-warning" id="resetAllBtn">⚠️ রিসেট</button>
            <button class="btn btn-outline" id="backToUserBtn">◀ ইউজার ভিউ</button>
        </div>
    </section>
</div>

<script>
    (function() {
        // ============================================================
        // এখানে টিম লিডার ও সহযোগীদের নাম বসান (শুধু এখানে এডিট করবেন)
        // ============================================================
        
        // টিম-১
        const TEAM1_LEADER = "ইয়াসিন";      // টিম-১ এর লিডার
        const TEAM1_MEMBER1 = "মোহাম্মদ আলী";    // টিম-১ এর ১ম সহযোগী
        const TEAM1_MEMBER2 = "আব্দুল্লাহ";       // টিম-১ এর ২য় সহযোগী
        
        // টিম-২
        const TEAM2_LEADER = "নয়ন";          // টিম-২ এর লিডার
        const TEAM2_MEMBER1 = "উমর ফারুক";        // টিম-২ এর ১ম সহযোগী
        const TEAM2_MEMBER2 = "উসমান গণি";        // টিম-২ এর ২য় সহযোগী
        
        // টিম-৩
        const TEAM3_LEADER = "তানজিম";      // টিম-৩ এর লিডার
        const TEAM3_MEMBER1 = "তাহমিদ"; // টিম-৩ এর ১ম সহযোগী
        const TEAM3_MEMBER2 = "রোহান"; // টিম-৩ এর ২য় সহযোগী
        
        // টিম-৪
        const TEAM4_LEADER = "ফারুক";          // টিম-৪ এর লিডার
        const TEAM4_MEMBER1 = "হামজা";             // টিম-৪ এর ১ম সহযোগী
        const TEAM4_MEMBER2 = "মুআজ";              // টিম-৪ এর ২য় সহযোগী
        
        // ============================================================
        // উপরের নামগুলো পরিবর্তন করলেই ইউজার ভিউতে আপডেট হবে
        // ============================================================

        const ADMIN_PASSWORD = "admin123";
        const STORAGE_KEY = "iftarTeamApp";
        
        // ডিফল্ট টিম কনফিগারেশন - উপরের নামগুলো এখানে বসবে
        const DEFAULT_TEAMS = [
            { 
                id: "team1", 
                name: "টিম-১", 
                leader: TEAM1_LEADER, 
                members: [TEAM1_MEMBER1, TEAM1_MEMBER2], 
                beforeTasks: ["১.নিছ থেকে পানি উঠাবে", "২.গ্লাসে পানি দেওয়া"], 
                afterTasks: ["১.উপর থেকে গ্লাস নামানো", "২.গ্লাস ধোয়া", "৩.ধোয়ার পর নিছ থেকে সব কিছু উপরে সাজাই রাখা।"] 
            },
            { 
                id: "team2", 
                name: "টিম-২", 
                leader: TEAM2_LEADER, 
                members: [TEAM2_MEMBER1, TEAM2_MEMBER2],
                beforeTasks: ["১.গ্লাস সাজানো", "২.খেজুর ও চিরা ধোয়া।"],
                afterTasks: ["১.গ্লাস গুছানো", "২.প্লেট ঝারা", "৩.ঝারু দেওয়"] 
            },
            { 
                id: "team3", 
                name: "টিম-৩", 
                leader: TEAM3_LEADER, 
                members: [TEAM3_MEMBER1, TEAM3_MEMBER2],
                beforeTasks: ["১.প্লেট সাজানো", "২.খাবার দেওয়া।"],
                afterTasks: ["১.প্লেট নামানো", "২.প্লেট মাজা", "৩.প্লেট ধোয়া।"] 
            },
            { 
                id: "team4", 
                name: "টিম-৪", 
                leader: TEAM4_LEADER, 
                members: [TEAM4_MEMBER1, TEAM4_MEMBER2],
                beforeTasks: ["১.খাবার আনা", "২.খাবার দেওয়ার পর প্লেট সাজাই দেওয়া।"],
                afterTasks: ["১.ইফতারের পর প্লেট গুছাই রাখা", "২.উপর পরিস্কার করা।"] 
            }
        ];

        // রমজানের সময়সূচী
        const RAMADAN_SCHEDULE = [
            { date: "১১ ফেব্রুয়ারি", day: "বৃহস্পতিবার", sehri: "৫:১৫", fajr: "৫:১৮", iftar: "৬:০২", phase: 1 },
            { date: "২০ ফেব্রুয়ারি", day: "শুক্রবার", sehri: "৫:১৪", fajr: "৫:১৭", iftar: "৬:০২", phase: 1 },
            { date: "২১ ফেব্রুয়ারি", day: "শনিবার", sehri: "৫:১৩", fajr: "৫:১৬", iftar: "৬:০৩", phase: 1 },
            { date: "২২ ফেব্রুয়ারি", day: "রবিবার", sehri: "৫:১৩", fajr: "৫:১৬", iftar: "৬:০৩", phase: 1 },
            { date: "২৩ ফেব্রুয়ারি", day: "সোমবার", sehri: "৫:০৯", fajr: "৫:১৫", iftar: "৬:০৬", phase: 1 },
            { date: "২৪ ফেব্রুয়ারি", day: "মঙ্গলবার", sehri: "৫:১২", fajr: "৫:১৫", iftar: "৬:০৪", phase: 1 },
            { date: "২৫ ফেব্রুয়ারি", day: "বুধবার", sehri: "৫:১১", fajr: "৫:১৪", iftar: "৬:০৫", phase: 1 },
            { date: "২৬ ফেব্রুয়ারি", day: "বৃহস্পতিবার", sehri: "৫:১০", fajr: "৫:১৩", iftar: "৬:০৫", phase: 1 },
            { date: "২৭ ফেব্রুয়ারি", day: "শুক্রবার", sehri: "৫:০৯", fajr: "৫:১২", iftar: "৬:০৬", phase: 1 },
            { date: "২৮ ফেব্রুয়ারি", day: "শনিবার", sehri: "৫:০৮", fajr: "৫:১১", iftar: "৬:০৬", phase: 1 },
            { date: "১ মার্চ", day: "রবিবার", sehri: "৫:০৮", fajr: "৫:১০", iftar: "৬:০৭", phase: 2 },
            { date: "২ মার্চ", day: "সোমবার", sehri: "৫:০০", fajr: "৫:১০", iftar: "৬:০৭", phase: 2 },
            { date: "৩ মার্চ", day: "মঙ্গলবার", sehri: "৫:০৬", fajr: "৫:০৯", iftar: "৬:০৮", phase: 2 },
            { date: "৪ মার্চ", day: "বুধবার", sehri: "৫:০৫", fajr: "৫:০৮", iftar: "৬:০৮", phase: 2 },
            { date: "৫ মার্চ", day: "বৃহস্পতিবার", sehri: "৫:০৪", fajr: "৫:০৭", iftar: "৬:০৮", phase: 2 },
            { date: "৬ মার্চ", day: "শুক্রবার", sehri: "৫:০৩", fajr: "৫:০৬", iftar: "৬:০৯", phase: 2 },
            { date: "৭ মার্চ", day: "শনিবার", sehri: "৫:০২", fajr: "৫:০৫", iftar: "৬:০৯", phase: 2 },
            { date: "৮ মার্চ", day: "রবিবার", sehri: "৫:০২", fajr: "৫:০৫", iftar: "৬:১০", phase: 2 },
            { date: "৯ মার্চ", day: "সোমবার", sehri: "৫:০১", fajr: "৫:০৪", iftar: "৬:১০", phase: 2 },
            { date: "১০ মার্চ", day: "মঙ্গলবার", sehri: "৫:০০", fajr: "৫:০৩", iftar: "৬:১০", phase: 2 },
            { date: "১১ মার্চ", day: "বুধবার", sehri: "৪:৫৯", fajr: "৫:০২", iftar: "৬:১১", phase: 3 },
            { date: "১২ মার্চ", day: "বৃহস্পতিবার", sehri: "৪:৫৮", fajr: "৫:০১", iftar: "৬:১১", phase: 3 },
            { date: "১৩ মার্চ", day: "শুক্রবার", sehri: "৪:৫৭", fajr: "৫:০০", iftar: "৬:১২", phase: 3 },
            { date: "১৪ মার্চ", day: "শনিবার", sehri: "৪:৫৬", fajr: "৪:৫৯", iftar: "৬:১২", phase: 3 },
            { date: "১৫ মার্চ", day: "রবিবার", sehri: "৪:৫৫", fajr: "৪:৫৮", iftar: "৬:১২", phase: 3 },
            { date: "১৬ মার্চ", day: "সোমবার", sehri: "৪:৫৪", fajr: "৪:৫৭", iftar: "৬:১৩", phase: 3 },
            { date: "১৭ মার্চ", day: "মঙ্গলবার", sehri: "৪:৫৩", fajr: "৪:৫৬", iftar: "৬:১৩", phase: 3 },
            { date: "১৮ মার্চ", day: "বুধবার", sehri: "৪:৫২", fajr: "৪:৫৫", iftar: "৬:১৪", phase: 3 },
            { date: "১৯ মার্চ", day: "বৃহস্পতিবার", sehri: "৪:৫১", fajr: "৪:৫৪", iftar: "৬:১৪", phase: 3 },
            { date: "২০ মার্চ", day: "শুক্রবার", sehri: "৪:৫০", fajr: "৪:৫৩", iftar: "৬:১৪", phase: 3 }
        ];

        let appData = {
            teams: DEFAULT_TEAMS.map(t => ({...t, members: [...t.members]})), // ডিফল্ট টিম ইউজ করছি
            checkboxes: {},
            isAdmin: false
        };
        
        let currentDayIndex = 0;

        // টাইম ফাংশন
        function setTodayDate() {
            const today = new Date();
            const day = today.getDate();
            const month = today.getMonth();
            
            let monthName = month === 1 ? "ফেব্রুয়ারি" : month === 2 ? "মার্চ" : "ফেব্রুয়ারি";
            const todayString = `${day} ${monthName}`;
            
            let found = false;
            for (let i = 0; i < RAMADAN_SCHEDULE.length; i++) {
                if (RAMADAN_SCHEDULE[i].date === todayString) {
                    currentDayIndex = i;
                    found = true;
                    break;
                }
            }
            
            if (!found) {
                if (day === 23 && monthName === "ফেব্রুয়ারি") {
                    for (let i = 0; i < RAMADAN_SCHEDULE.length; i++) {
                        if (RAMADAN_SCHEDULE[i].date === "২৩ ফেব্রুয়ারি") {
                            currentDayIndex = i;
                            break;
                        }
                    }
                } else {
                    currentDayIndex = 0;
                }
            }
            
            updateDisplayForIndex();
        }

        function updateDisplayForIndex() {
            const data = RAMADAN_SCHEDULE[currentDayIndex];
            
            let phaseText = "১ম ১০ দিন (রহমত)";
            if (data.phase === 2) phaseText = "২য় ১০ দিন (মাগফিরাত)";
            if (data.phase === 3) phaseText = "৩য় ১০ দিন (নাজাত)";
            
            document.getElementById('phaseBadge').textContent = phaseText;
            document.getElementById('currentDateDisplay').textContent = data.date;
            document.getElementById('weekdayDisplay').textContent = data.day;
            document.getElementById('sehriTime').textContent = data.sehri;
            document.getElementById('fajrTime').textContent = data.fajr;
            document.getElementById('iftarTime').textContent = data.iftar;
            document.getElementById('gregorianDisplay').textContent = `${data.date} ২০২৬, ${data.day}`;
            
            document.getElementById('prevDayBtn').disabled = (currentDayIndex === 0);
            document.getElementById('nextDayBtn').disabled = (currentDayIndex === RAMADAN_SCHEDULE.length - 1);
        }

        window.changeDay = function(delta) {
            const newIndex = currentDayIndex + delta;
            if (newIndex >= 0 && newIndex < RAMADAN_SCHEDULE.length) {
                currentDayIndex = newIndex;
                updateDisplayForIndex();
            }
        };

        // ইউজার ভিউ রেন্ডার
        function renderUserView() {
            const container = document.getElementById('teamsAccordion');
            if (!container) return;
            
            let html = '';
            appData.teams.forEach((team) => {
                const teamId = team.id;
                const leaderHtml = team.leader ? `<span class="leader-badge">${team.leader}</span>` : '';
                const membersHtml = team.members && team.members.length ? 
                    team.members.map(m => `<span>${m}</span>`).join('') : '<span>কোনো সদস্য নেই</span>';
                
                html += `<div class="team-card" data-team-id="${teamId}">
                    <div class="card-header" onclick="toggleAccordion('${teamId}')">
                        <div class="team-title">
                            ${team.name} ${leaderHtml}
                            <span class="team-meta">👥 ${team.members ? team.members.length : 0}</span>
                        </div>
                        <span class="chevron" id="chevron-${teamId}">▼</span>
                    </div>
                    <div class="card-body" id="body-${teamId}">
                        <div class="task-section">
                            <h4>ইফতারের আগে</h4>
                            <ul class="task-list">`;
                team.beforeTasks.forEach((task, tIdx) => {
                    const taskId = `${teamId}_before_${tIdx}`;
                    const checked = appData.checkboxes[taskId] ? 'checked' : '';
                    html += `<li class="task-item">
                        <input type="checkbox" data-task-id="${taskId}" ${checked} onchange="updateCheckbox('${taskId}', this.checked)">
                        <span class="task-text">${task}</span>
                    </li>`;
                });
                html += `</ul></div><div class="task-section"><h4>ইফতারের পরে</h4><ul class="task-list">`;
                team.afterTasks.forEach((task, tIdx) => {
                    const taskId = `${teamId}_after_${tIdx}`;
                    const checked = appData.checkboxes[taskId] ? 'checked' : '';
                    html += `<li class="task-item">
                        <input type="checkbox" data-task-id="${taskId}" ${checked} onchange="updateCheckbox('${taskId}', this.checked)">
                        <span class="task-text">${task}</span>
                    </li>`;
                });
                html += `</ul></div>
                        <div class="member-list">
                            <strong>টিম সদস্য</strong>
                            <div class="member-names">${membersHtml}</div>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
            
            if (appData.teams.length > 0) {
                const firstId = appData.teams[0].id;
                const firstBody = document.getElementById(`body-${firstId}`);
                const firstChevron = document.getElementById(`chevron-${firstId}`);
                if (firstBody) firstBody.classList.add('open');
                if (firstChevron) firstChevron.style.transform = 'rotate(180deg)';
            }
            
            setTodayDate();
        }

        window.toggleAccordion = function(teamId) {
            const body = document.getElementById(`body-${teamId}`);
            const chevron = document.getElementById(`chevron-${teamId}`);
            if (body && chevron) {
                body.classList.toggle('open');
                chevron.style.transform = body.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
            }
        };

        window.updateCheckbox = function(taskId, checked) {
            appData.checkboxes[taskId] = checked;
            // localStorage এ সেভ করছি না কারণ সবাইকে একই ডাটা দেখাতে হবে
            // শুধু চেকবক্স স্টেট মনে রাখার জন্য
        };

        // অ্যাডমিন ড্যাশবোর্ড রেন্ডার
        function renderAdminDashboard() {
            const container = document.getElementById('teamEditorsContainer');
            if (!container) return;
            
            let html = '';
            appData.teams.forEach((team) => {
                html += `<div class="team-editor" data-team-id="${team.id}">
                    <h3 style="color:#0f5132;">${team.name}</h3>
                    <div class="leader-input">
                        <label>লিডার: <strong>${team.leader || 'নেই'}</strong></label>
                    </div>
                    <div class="member-list-admin">
                        <strong>সদস্য তালিকা</strong>
                        ${team.members && team.members.length ? team.members.map((mem, idx) => `
                            <div class="member-row">
                                <span>${mem}</span>
                            </div>`).join('') : '<p>কোনো সদস্য নেই</p>'}
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ভিউ কন্ট্রোল
        function showUserView() {
            document.getElementById('userView').classList.remove('hidden');
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
            appData.isAdmin = false;
            renderUserView();
        }

        function showAdminLogin() {
            document.getElementById('userView').classList.add('hidden');
            document.getElementById('adminLogin').classList.remove('hidden');
            document.getElementById('adminDashboard').classList.add('hidden');
        }

        function showAdminDashboard() {
            document.getElementById('userView').classList.add('hidden');
            document.getElementById('adminLogin').classList.add('hidden');
            document.getElementById('adminDashboard').classList.remove('hidden');
            renderAdminDashboard();
            appData.isAdmin = true;
        }

        // লগইন
        document.getElementById('loginBtn')?.addEventListener('click', function() {
            const pass = document.getElementById('adminPass').value;
            if (pass === ADMIN_PASSWORD) {
                showAdminDashboard();
                document.getElementById('adminPass').value = '';
            } else {
                alert('পাসওয়ার্ড ভুল!');
            }
        });

        document.getElementById('logoutBtn')?.addEventListener('click', showUserView);
        document.getElementById('backToUserBtn')?.addEventListener('click', showUserView);
        document.getElementById('adminToggleBtn')?.addEventListener('click', function() {
            if (appData.isAdmin) {
                showUserView();
            } else {
                showAdminLogin();
            }
        });

        document.getElementById('printViewBtn')?.addEventListener('click', function() {
            window.print();
        });

        document.getElementById('addNewTeamBtn')?.addEventListener('click', function() {
            alert('ডাটাবেস ছাড়া নতুন টিম যোগ করা যাবে না। সরাসরি কোড এডিট করে টিম যোগ করুন।');
        });

        document.getElementById('resetAllBtn')?.addEventListener('click', function() {
            alert('ডাটাবেস ছাড়া রিসেট করা যাবে না।');
        });

        // ইনিশিয়ালাইজ
        function init() {
            renderUserView();
            showUserView();
        }

        init();
    })();
</script>
</body>

</html>
